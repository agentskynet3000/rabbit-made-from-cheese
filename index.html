<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rabbit Made From Cheese</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
  <link href="https://unpkg.com/nes.css@latest/css/nes.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #FFB7C5;
      color: #2D1B2E;
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      image-rendering: pixelated;
    }

    /* ── ANIMATIONS ── */
    @keyframes badge-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.7; }
    }

    /* ── LAYOUT ── */
    #page-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── HEADER ── */
    #header-container {
      margin-bottom: 24px;
      text-align: center;
      padding: 32px 16px 16px;
    }

    #main-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(3rem, 7vw, 5rem);
      font-weight: 900;
      color: #F5C518;
      line-height: 1.5;
      text-shadow: 3px 3px 0px #2D1B2E, -1px -1px 0px #2D1B2E, 1px -1px 0px #2D1B2E, -1px 1px 0px #2D1B2E, 6px 6px 0px #2D1B2E;
      margin-bottom: 16px;
    }

    #header-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.55rem, 1.2vw, 0.75rem);
      color: #2D1B2E;
      line-height: 2;
      margin-bottom: 20px;
    }

    /* ── BADGE ── */
    #drop-badge {
      display: inline-block;
      background: #FF69B4;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      padding: 8px 20px;
      border-radius: 999px;
      animation: badge-blink 1.4s step-end infinite;
      letter-spacing: 0.05em;
    }

    /* ── GRID ── */
    #gallery {
      margin-bottom: 32px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .thumb {
      cursor: pointer;
    }

    .thumb-nes-wrap {
      position: relative;
      width: 100%;
      padding-top: 100%;
      margin-bottom: 0;
      transition: transform 0.15s ease;
    }

    .thumb:hover .thumb-nes-wrap {
      transform: scale(1.04);
    }

    .thumb-nes-inner {
      position: absolute;
      inset: 0;
      background: transparent;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 4px 4px 0px #e8a0b0;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      image-rendering: auto;
    }

    .thumb-badge-wrap {
      position: absolute;
      top: -10px;
      right: -10px;
      z-index: 2;
      font-size: 0.7rem;
    }

    .thumb-caption {
      margin-top: 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: #2D1B2E;
      text-align: center;
      line-height: 1.8;
      padding: 0 2px;
      word-break: break-word;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20, 10, 20, 0.93);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    #lightbox.active {
      display: flex;
    }

    #lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 210;
      font-family: 'Press Start 2P', monospace;
      font-size: 1rem;
      min-width: 56px;
    }

    #lightbox-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 90vw;
    }

    #lightbox-img-wrap {
      background: #FFF0F5;
      padding: 8px !important;
      display: inline-block;
    }

    #lightbox img {
      max-width: 75vw;
      max-height: 62vh;
      object-fit: contain;
      display: block;
      image-rendering: auto;
    }

    #lightbox-caption {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      font-weight: 700;
      color: #FFE4EF;
      text-align: center;
      line-height: 1.8;
      text-transform: uppercase;
    }

    #lightbox-counter {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.6rem, 1.2vw, 0.85rem);
      color: rgba(255, 180, 200, 0.85);
      text-align: center;
    }

    #lightbox-nav {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    #lightbox-nav .nes-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.85rem;
    }

    /* ── FOOTER ── */
    #footer-container {
      background: #fff !important;
      text-align: center;
    }

    .footer-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.4rem, 3vw, 1.8rem);
      font-weight: 700;
      color: #F5C518;
      margin-bottom: 16px;
      line-height: 1.8;
    }

    .footer-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.65rem, 1.5vw, 0.85rem);
      font-weight: 700;
      color: #2D1B2E;
      line-height: 2.2;
      margin-bottom: 16px;
    }

    .footer-copy {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      color: #a07080;
      margin-top: 12px;
      line-height: 2;
    }

    .footer-icons {
      margin: 12px 0;
    }

    .footer-icons i {
      margin: 0 4px;
    }

    /* NES list nav override */
    #footer-nav {
      display: inline-block;
      text-align: left;
      margin-top: 16px;
    }

    #footer-nav.nes-list.is-disc li::before {
      color: #F5C518;
    }

    #footer-nav li {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: #c090a8;
      line-height: 2.5;
      cursor: pointer;
    }

    #footer-nav li:hover {
      color: #F5C518;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      #grid { grid-template-columns: 1fr; gap: 16px; }
    }

    @media (max-width: 480px) {
      #page-wrap { padding: 16px 12px; }
      #grid { grid-template-columns: 1fr; gap: 12px; }
      #main-title { font-size: clamp(1.8rem, 9vw, 2.6rem); }
      .thumb-caption { font-size: 0.6rem; }
      #lightbox img { max-width: 90vw; max-height: 55vh; }
      #lightbox-nav { gap: 12px; }
      #lightbox-nav .nes-btn { font-size: 0.65rem; }
    }
  
  </style>
</head>
<body>

  <div id="page-wrap">

    <!-- ── HEADER ── -->
    <header>
      <div id="header-container">
        <h1 id="main-title">RABBIT MADE<br>FROM CHEESE</h1>
        <p id="header-sub">A new rabbit every hour. We are not stopping. Ever.</p>
        <span id="drop-badge">NEW DROP EVERY HOUR</span>
    <p id="countdown" style="font-family:'Press Start 2P',monospace; font-size:0.6rem; color:#2D1B2E; margin-top:0.5rem; text-align:center; letter-spacing:0.05em;">
      next drop in <span id="timer">--:--</span>
    </p>
      </div>
    

    
  </header>

    <!-- ── GALLERY ── -->
    <section id="gallery">
      <div id="grid"></div>
    </section>

    <!-- ── FOOTER ── -->
    <footer>
      <div class="nes-container is-rounded" id="footer-container">
        <div class="footer-icons">
          <i class="nes-icon star is-small"></i>
          <i class="nes-icon heart is-small"></i>
          <i class="nes-icon star is-small"></i>
        </div>

        <p class="footer-title">RABBIT MADE FROM CHEESE</p>
        <p class="footer-sub">
          AN ONGOING INVESTIGATION<br>
          New rabbit every hour. We will never stop.
        </p>

        

        <p class="footer-copy">&copy; 2026 Nobody. All cheese reserved.</p>
      </div>
    </footer>

  </div><!-- /page-wrap -->

  <!-- ── LIGHTBOX ── -->
  <div id="lightbox" onclick="closeLightbox()">
    <button id="lightbox-close" class="nes-btn is-error" onclick="event.stopPropagation(); closeLightbox()">X</button>
    <div id="lightbox-content" onclick="event.stopPropagation()">
      <div class="nes-container" id="lightbox-img-wrap">
        <img id="lightbox-img" src="" alt="">
      </div>
      <p id="lightbox-caption"></p>
      <p id="lightbox-counter"></p>
      <div id="lightbox-nav">
        <button class="nes-btn is-primary" onclick="lightboxPrev()">&#9664; PREV</button>
        <button class="nes-btn is-primary" onclick="lightboxNext()">NEXT &#9654;</button>
      </div>
    </div>
  </div>

  <script>
    const images = [
      "images/rabbit-001-pink-background.jpg",
      "images/rabbit-002-inside-a-fridge.jpg",
      "images/rabbit-003-at-burning-man.jpg",
      "images/rabbit-004-on-the-moon.jpg",
      "images/rabbit-005-in-ancient-egypt.jpg",
      "images/rabbit-006-in-a-haunted-house.jpg",
      "images/rabbit-007-in-the-vatican.jpg",
      "images/rabbit-009-skeleton.jpg",
      "images/rabbit-008-surfing-a-wave.jpg",
      "images/rabbit-010-at-a-bingo-night.jpg",
    ];

    let shuffledImages = [];
    let currentLightboxIndex = 0;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function captionFromSrc(src) {
      const name = src.split('/').pop().replace(/\.\w+$/, '');
      return name.replace(/^rabbit-\d+-/, '').replace(/-/g, ' ');
    }

    function badgeFromSrc(src) {
      const match = src.match(/rabbit-(\d+)-/);
      return match ? '#' + match[1].padStart(3, '0') : '';
    }

    function updateLightbox() {
      const src = shuffledImages[currentLightboxIndex];
      const caption = captionFromSrc(src);
      const badge = badgeFromSrc(src);
      const total = shuffledImages.length;

      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox-img').alt = caption;
      document.getElementById('lightbox-caption').textContent = caption.toUpperCase();
      document.getElementById('lightbox-counter').textContent =
        'Rabbit ' + badge + ' of ' + total;
    }

    function openLightbox(index) {
      currentLightboxIndex = index;
      updateLightbox();
      document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    function lightboxPrev() {
      currentLightboxIndex = (currentLightboxIndex - 1 + shuffledImages.length) % shuffledImages.length;
      updateLightbox();
    }

    function lightboxNext() {
      currentLightboxIndex = (currentLightboxIndex + 1) % shuffledImages.length;
      updateLightbox();
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lightboxPrev();
      if (e.key === 'ArrowRight') lightboxNext();
    });

    function renderGrid() {
      shuffledImages = [...images].sort((a, b) => b.localeCompare(a));
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      shuffledImages.forEach((src, index) => {
        const caption = captionFromSrc(src);
        const badge = badgeFromSrc(src);

        const div = document.createElement('div');
        div.className = 'thumb';

        const wrap = document.createElement('div');
        wrap.className = 'thumb-nes-wrap';

        const inner = document.createElement('div');
        inner.className = 'thumb-nes-inner';

        const img = document.createElement('img');
        img.src = src;
        img.loading = 'lazy';
        img.alt = caption;

        if (badge) {
          const badgeWrap = document.createElement('div');
          badgeWrap.className = 'thumb-badge-wrap';
          const badgeEl = document.createElement('span');
          badgeEl.className = 'nes-badge';
          const badgeSpan = document.createElement('span');
          badgeSpan.className = 'is-warning';
          badgeSpan.textContent = badge;
          badgeEl.appendChild(badgeSpan);
          badgeWrap.appendChild(badgeEl);
          wrap.appendChild(badgeWrap);
        }

        const cap = document.createElement('div');
        cap.className = 'thumb-caption';
        cap.textContent = caption;

        inner.appendChild(img);
        wrap.appendChild(inner);
        div.appendChild(wrap);
        div.appendChild(cap);
        div.onclick = () => openLightbox(index);
        grid.appendChild(div);
      });
    }

    renderGrid();
  
    // Countdown to next hour
    function updateCountdown() {
      const now = new Date();
      const nextHour = new Date(now);
      nextHour.setHours(nextHour.getHours() + 1, 0, 0, 0);
      const diff = nextHour - now;
      if (diff <= 1000) {
        // New drop time — reload to show new rabbit!
        setTimeout(() => location.reload(), 3000);
      }
      const mins = Math.floor(diff / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      const el = document.getElementById('timer');
      if (el) el.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

  </script>
</body>
</html>
