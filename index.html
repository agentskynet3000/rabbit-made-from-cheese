<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rabbit Made From Cheese</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffd6e7;
      color: #111;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    #header {
      padding: 48px 32px 32px;
    }

    #main-title {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      color: #111;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    #drop-line {
      margin-top: 10px;
      font-size: 0.875rem;
      font-weight: 400;
      color: #888;
      letter-spacing: 0.01em;
    }

    #header hr {
      margin-top: 32px;
      border: none;
      border-top: 1px solid rgba(0, 0, 0, 0.12);
    }

    /* ── GRID ── */
    #gallery {
      padding: 24px 32px 0;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .thumb {
      cursor: pointer;
    }

    .thumb-img-wrap {
      width: 100%;
      padding-top: 100%;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .thumb:hover .thumb-img-wrap {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .thumb img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-caption {
      margin-top: 6px;
      font-size: 0.75rem;
      font-weight: 400;
      color: #888;
      padding: 0 2px;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      cursor: pointer;
    }

    #lightbox.active {
      display: flex;
    }

    #lightbox img {
      max-width: 88vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 16px;
    }

    #lightbox-caption {
      font-size: 0.85rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.55);
    }

    #lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 1.5rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    #lightbox-close:hover {
      color: #fff;
    }

    /* ── FOOTER ── */
    #footer {
      margin-top: 48px;
      padding: 32px;
      border-top: 1px solid rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    #footer .footer-main {
      font-size: 0.875rem;
      font-weight: 500;
      color: #444;
    }

    #footer .footer-url {
      margin-top: 6px;
      font-size: 0.75rem;
      color: #aaa;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      #grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      #header { padding: 32px 20px 24px; }
      #gallery { padding: 20px 20px 0; }
      #footer { padding: 32px 20px; }
      #grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header id="header">
    <h1 id="main-title">Rabbit Made From Cheese</h1>
    <p id="drop-line">Drop #<span id="rabbit-count">0</span> — Every hour, a new rabbit.</p>
    <hr>
  </header>

  <!-- ── GALLERY ── -->
  <section id="gallery">
    <div id="grid"></div>
  </section>

  <!-- ── FOOTER ── -->
  <footer id="footer">
    <p class="footer-main">A new rabbit every hour. Since March 2026.</p>
    <p class="footer-url">rabbit-made-from-cheese.pages.dev</p>
  </footer>

  <!-- ── LIGHTBOX ── -->
  <div id="lightbox" onclick="closeLightbox()">
    <span id="lightbox-close" onclick="closeLightbox()">&#x2715;</span>
    <img id="lightbox-img" src="" alt="">
    <p id="lightbox-caption"></p>
  </div>

  <script>
    const images = [
      "images/rabbit-001-pink-background.jpg",
      "images/rabbit-002-inside-a-fridge.jpg",
    ];

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function captionFromSrc(src) {
      const name = src.split('/').pop().replace(/\.\w+$/, '');
      return name.replace(/^rabbit-\d+-/, '').replace(/-/g, ' ');
    }

    function openLightbox(src, caption) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox-caption').textContent = caption;
      document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });

    document.getElementById('lightbox-img').addEventListener('click', e => e.stopPropagation());

    function renderGrid() {
      const shuffled = shuffle([...images]);
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      document.getElementById('rabbit-count').textContent = shuffled.length;

      shuffled.forEach(src => {
        const caption = captionFromSrc(src);

        const div = document.createElement('div');
        div.className = 'thumb';

        const wrap = document.createElement('div');
        wrap.className = 'thumb-img-wrap';

        const img = document.createElement('img');
        img.src = src;
        img.loading = 'lazy';
        img.alt = caption;

        const cap = document.createElement('div');
        cap.className = 'thumb-caption';
        cap.textContent = caption;

        wrap.appendChild(img);
        div.appendChild(wrap);
        div.appendChild(cap);
        div.onclick = () => openLightbox(src, caption);
        grid.appendChild(div);
      });
    }

    renderGrid();
  </script>
</body>
</html>
