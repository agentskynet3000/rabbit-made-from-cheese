    /* ── SUBSCRIBE BAR (fixed bottom) ── */
    #subscribe-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      background: #F5C518;
      border-top: 4px solid #2D1B2E;
      box-shadow: 0 -4px 0 #2D1B2E;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 20px;
      flex-wrap: wrap;
    }

    #subscribe-bar label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: #2D1B2E;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    #sub-email {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      padding: 10px 14px;
      border: 3px solid #2D1B2E;
      background: #fff;
      color: #2D1B2E;
      width: 240px;
      box-shadow: 3px 3px 0 #2D1B2E;
      outline: none;
    }

    #sub-email:focus {
      box-shadow: 3px 3px 0 #2D1B2E, 0 0 0 2px #FF69B4;
    }

    #sub-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 10px 20px;
      background: #2D1B2E;
      color: #F5C518;
      border: 3px solid #2D1B2E;
      cursor: pointer;
      box-shadow: 3px 3px 0 #1a0a10;
      white-space: nowrap;
      letter-spacing: 0.05em;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #sub-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 #1a0a10;
    }

    #sub-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #1a0a10;
    }

    #subscribe-msg {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: #2D1B2E;
      line-height: 1.8;
      display: none;
    }

    @media (max-width: 600px) {
      #subscribe-bar { flex-direction: column; gap: 8px; padding: 12px 16px; }
      #sub-email { width: 100%; max-width: 300px; }
    }

    /* ── NEWS TICKER ── */
    #ticker-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      background: #1a0a10;
      border-bottom: 3px solid #F5C518;
      display: flex;
      align-items: center;
      overflow: hidden;
      height: 36px;
    }

    #ticker-label {
      flex-shrink: 0;
      background: #F5C518;
      color: #1a0a10;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 0 12px;
      height: 100%;
      display: flex;
      align-items: center;
      white-space: nowrap;
      letter-spacing: 0.05em;
      z-index: 2;
    }

    #ticker-track-wrap {
      overflow: hidden;
      flex: 1;
      position: relative;
    }

    #ticker-track {
      display: inline-flex;
      white-space: nowrap;
      animation: ticker-scroll 60s linear infinite;
    }

    #ticker-track:hover {
      animation-play-state: paused;
    }

    .ticker-item {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.52rem;
      color: #F5C518;
      padding: 0 40px;
      letter-spacing: 0.04em;
      line-height: 36px;
    }

    .ticker-item::before {
      content: '★ ';
      color: #FF69B4;
    }

    @keyframes ticker-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    body {
      padding-top: 36px;
    }

    /* ── ANIMATIONS ── */
    @keyframes badge-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.7; }
    }

    /* ── LAYOUT ── */
    #page-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── HEADER ── */
    #header-container {
      margin-bottom: 24px;
      text-align: center;
      padding: 32px 16px 16px;
    }

    #main-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(3rem, 7vw, 5rem);
      font-weight: 900;
      color: #F5C518;
      line-height: 1.5;
      text-shadow: 3px 3px 0px #2D1B2E, -1px -1px 0px #2D1B2E, 1px -1px 0px #2D1B2E, -1px 1px 0px #2D1B2E, 6px 6px 0px #2D1B2E;
      margin-bottom: 16px;
    }

    #header-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.55rem, 1.2vw, 0.75rem);
      color: #2D1B2E;
      line-height: 2;
      margin-bottom: 20px;
    }

    /* ── BADGE ── */
    #drop-badge {
      display: inline-block;
      background: #FF69B4;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      padding: 8px 20px;
      border-radius: 999px;
      animation: badge-blink 1.4s step-end infinite;
      letter-spacing: 0.05em;
    }

    /* ── GRID ── */
    #gallery {
      margin-bottom: 32px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .thumb {
      cursor: pointer;
    }

    .thumb-nes-wrap {
      position: relative;
      width: 100%;
      padding-top: 100%;
      margin-bottom: 0;
      transition: transform 0.15s ease;
    }

    .thumb:hover .thumb-nes-wrap {
      transform: scale(1.04);
    }

    .thumb-nes-inner {
      position: absolute;
      inset: 0;
      background: transparent;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 4px 4px 0px #e8a0b0;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      image-rendering: auto;
    }

    .thumb-badge-wrap {
      position: absolute;
      top: -10px;
      right: -10px;
      z-index: 2;
      font-size: 0.7rem;
    }

    .thumb-caption {
      margin-top: 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: #2D1B2E;
      text-align: center;
      line-height: 1.8;
      padding: 0 2px;
      word-break: break-word;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20, 10, 20, 0.93);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    #lightbox.active {
      display: flex;
    }

    #lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 210;
      font-family: 'Press Start 2P', monospace;
      font-size: 1rem;
      min-width: 56px;
    }

    #lightbox-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 90vw;
    }

    #lightbox-img-wrap {
      background: #FFF0F5;
      padding: 8px !important;
      display: inline-block;
    }

    #lightbox img {
      max-width: 75vw;
      max-height: 62vh;
      object-fit: contain;
      display: block;
      image-rendering: auto;
    }

    #lightbox-caption {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.7rem, 1.5vw, 1rem);
      font-weight: 700;
      color: #FFE4EF;
      text-align: center;
      line-height: 1.8;
      text-transform: uppercase;

      font-size: clamp(0.6rem, 1.2vw, 0.85rem);

      text-align: left;
      margin-top: 16px;

    #footer-nav li {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: #c090a8;
      line-height: 2.5;
      cursor: pointer;

      #main-title { font-size: clamp(1.8rem, 9vw, 2.6rem); }
      .thumb-caption { font-size: 0.6rem; }
      #lightbox img { max-width: 90vw; max-height: 55vh; }
      #lightbox-nav { gap: 12px; }
      #lightbox-nav .nes-btn { font-size: 0.65rem; }

    let shuffledImages = [];
    let currentLightboxIndex = 0;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const UNRELATED_LABELS = [
      "quarterly earnings report", "dental appointment", "mild inconvenience",
      "terms and conditions", "pending invoice", "loading please wait",
      "user agreement", "out of office reply", "warranty void if opened",
      "not a valid receipt", "system update required", "under construction",
      "lorem ipsum dolor", "error 404 meaning not found", "buffering",
      "we value your feedback", "this field is required", "cookies accepted",
      "do not refrigerate", "results may vary", "subject to change",
      "password must contain a symbol", "your call is important to us",
      "estimated delivery 3–5 business days", "mild turbulence expected",
      "item discontinued", "new tab", "untitled document",
      "for internal use only", "page 1 of 1", "no events this weekend",
      "read all messages", "cache cleared", "default folder",
      "annual report 2019", "unsubscribe successful", "file not found",
      "meeting rescheduled", "draft saved", "tap to reveal",
      "sold separately", "batteries not included", "handle with care",
      "this side up", "fragile", "contents may have shifted",
      "not suitable for children under 3", "store in a cool dry place",
      "shake well before use", "some assembly required", "void where prohibited",
      "objects in mirror are closer than they appear", "slippery when wet",
      "do not iron", "dry clean only", "one size fits all",
      "your mileage may vary", "limit one per customer", "while supplies last",
      "offer expires midnight", "no purchase necessary", "see reverse for details",
      "printed on recycled paper", "certified pre-owned", "as seen on tv",
      "new and improved", "now with more fiber", "zero calories",
      "clinically proven", "dermatologist tested", "4 out of 5 dentists agree",
      "contains no artificial flavors", "made from concentrate",
      "product of multiple countries", "best before see lid",
      "keep away from heat and direct sunlight", "not for resale",
      "promotional item only", "complimentary copy", "draft version",
      "subject to availability", "management reserves the right",
      "prices include vat", "all major credit cards accepted",
      "free wifi password on request", "tip not included",
    ];

    function captionFromSrc(src) {
      // Extract the rabbit number and use it to pick a stable unrelated label
      const match = src.match(/rabbit-(\d+)-/);
      const index = match ? (parseInt(match[1], 10) - 1) % UNRELATED_LABELS.length : 0;
      return UNRELATED_LABELS[index];
    }

    function badgeFromSrc(src) {
      const match = src.match(/rabbit-(\d+)-/);
      return match ? '#' + match[1].padStart(3, '0') : '';
    }

    function updateLightbox() {
      const src = shuffledImages[currentLightboxIndex];
      const caption = captionFromSrc(src);
      const badge = badgeFromSrc(src);
      const total = shuffledImages.length;

      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox-img').alt = caption;
      document.getElementById('lightbox-caption').textContent = caption.toUpperCase();
      document.getElementById('lightbox-counter').textContent =
        'Rabbit ' + badge + ' of ' + total;
    }

    function openLightbox(index) {
      currentLightboxIndex = index;
      updateLightbox();
      document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    function lightboxPrev() {
      currentLightboxIndex = (currentLightboxIndex - 1 + shuffledImages.length) % shuffledImages.length;
      updateLightbox();
    }

    function lightboxNext() {
      currentLightboxIndex = (currentLightboxIndex + 1) % shuffledImages.length;
      updateLightbox();
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lightboxPrev();
      if (e.key === 'ArrowRight') lightboxNext();
    });

    function renderGrid() {
      shuffledImages = [...images].sort((a, b) => b.localeCompare(a));
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      shuffledImages.forEach((src, index) => {
        const caption = captionFromSrc(src);
        const badge = badgeFromSrc(src);

        const div = document.createElement('div');
        div.className = 'thumb';

        const wrap = document.createElement('div');
        wrap.className = 'thumb-nes-wrap';

        const inner = document.createElement('div');
        inner.className = 'thumb-nes-inner';

        const img = document.createElement('img');
        img.src = src;
        img.loading = 'lazy';
        img.alt = caption;

        if (badge) {
          const badgeWrap = document.createElement('div');
          badgeWrap.className = 'thumb-badge-wrap';
          const badgeEl = document.createElement('span');
          badgeEl.className = 'nes-badge';
          const badgeSpan = document.createElement('span');
          badgeSpan.className = 'is-warning';
          badgeSpan.textContent = badge;
          badgeEl.appendChild(badgeSpan);
          badgeWrap.appendChild(badgeEl);
          wrap.appendChild(badgeWrap);
        }

        const cap = document.createElement('div');
        cap.className = 'thumb-caption';
        cap.textContent = caption;

        inner.appendChild(img);
        wrap.appendChild(inner);
        div.appendChild(wrap);
        div.appendChild(cap);
        div.onclick = () => openLightbox(index);
        grid.appendChild(div);
      });
    }

    renderGrid();

    function getTodaysNews() {
      const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
      const weekIndex = Math.floor(dayOfYear / 7) % allNews.length;
      return allNews[weekIndex];
    }

    function buildTicker() {
      const news = getTodaysNews();
      const track = document.getElementById('ticker-track');
      // Double the items so the scroll loops seamlessly
      const doubled = [...news, ...news];
      track.innerHTML = doubled.map(n => `<span class="ticker-item">${n}</span>`).join('');
    }

    // ── SUBSCRIBE ──
    async function submitSubscribe() {
      const emailEl = document.getElementById('sub-email');
      const btnEl = document.getElementById('sub-btn');
      const email = emailEl.value.trim();

      if (!email || !email.includes('@')) {
        showMsg('please enter a valid email.', '#c0392b');
        return;
      }

      btnEl.textContent = '...';
      btnEl.disabled = true;

      try {
        const res = await fetch('https://rabbit-made-from-cheese.pages.dev/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        if (!res.ok) throw new Error('server error ' + res.status);
        const data = await res.json();
        if (data.ok) {
          emailEl.style.display = 'none';
          btnEl.style.display = 'none';
          document.querySelector('#subscribe-bar label').textContent = '🐰 GET DAILY RABBIT DIGEST IN YOUR INBOX';
          showMsg('subscribed. rabbits incoming. you cannot stop this.', '#2D1B2E');
        } else {
          showMsg(data.error || 'something went wrong.', '#c0392b');
          btnEl.textContent = 'SUBSCRIBE →';
          btnEl.disabled = false;
        }
      } catch (e) {
        console.error('subscribe error:', e);
        showMsg('error: ' + e.message, '#c0392b');
        btnEl.textContent = 'SUBSCRIBE →';
        btnEl.disabled = false;
      }
    }

    function showMsg(text, color) {
      const el = document.getElementById('subscribe-msg');
      el.style.color = color;
      el.textContent = text;
      el.style.display = 'block';
    }

    document.getElementById('sub-email').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitSubscribe();
    });

    // Countdown to next hour
    function updateCountdown() {
      const now = new Date();
      const nextHour = new Date(now);
      nextHour.setHours(nextHour.getHours() + 1, 0, 0, 0);
      const diff = nextHour - now;
      if (diff <= 1000) {
        // New drop time — reload to show new rabbit!
        setTimeout(() => location.reload(), 3000);
      }
      const mins = Math.floor(diff / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      const el = document.getElementById('timer');
      if (el) el.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
